services:
  db:
    image: postgres:16
    container_name: lifereview_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: mo
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifereview

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mo -d lifereview"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: lifereview_migrate

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./migrations:/migrations

    command: [
      "-path", "/migrations",
      "-database", "postgres://mo:postgres@db:5432/lifereview?sslmode=disable",
      "up"
    ]

    restart: "no"

  server:
    build: .
    container_name: lifereview_backend
    restart: unless-stopped

    depends_on:
      migrate:
        condition: service_completed_successfully

    ports:
      - "8080:8080"

    environment:
      PORT: 8080
      DATABASE_URL: postgres://mo:postgres@db:5432/lifereview?sslmode=disable
      ADMIN_KEY: JLASDfkjlakjdfgsdflkjadflkjlkj
      ALLOWED_ORIGINS: http://localhost:5173

volumes:
  postgres_data: